name: Build EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow lxml

      - name: Update version number
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content photo_paste.py) -replace 'VERSION = ".*"', "VERSION = `"$version`"" | Set-Content photo_paste.py

      - name: Build EXE
        run: pyinstaller 照片黏貼工具.spec

      - name: Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} dist/photo-helper.exe `
            --title "版本 ${{ github.ref_name }}" `
            --notes "自動打包版本 ${{ github.ref_name }}"
